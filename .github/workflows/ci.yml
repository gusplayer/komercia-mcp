name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-typecheck:
    name: Lint & Typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build shared packages
        run: pnpm build --filter="./packages/*"

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

  test:
    name: Test
    runs-on: ubuntu-latest
    needs: lint-typecheck
    env:
      NODE_ENV: test
      JWT_SECRET: ${{ secrets.JWT_SECRET_TEST || 'ci-test-secret-at-least-32-characters-long-for-hs256' }}
      DATABASE_URL: ${{ secrets.DATABASE_URL_TEST || '' }}
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build packages
        run: pnpm build --filter="./packages/*"

      - name: Run unit & integration tests
        run: pnpm test

      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: coverage
          path: "**/coverage/"
          retention-days: 7

  e2e:
    name: E2E (Web)
    runs-on: ubuntu-latest
    needs: lint-typecheck
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browsers
        run: pnpm --filter @komercia-mcp/web exec playwright install --with-deps chromium

      - name: Build web app
        run: pnpm build --filter @komercia-mcp/web

      - name: Run E2E tests
        run: pnpm --filter @komercia-mcp/web test:e2e
        env:
          NODE_ENV: test
          JWT_SECRET: ci-test-secret-at-least-32-characters-long-for-hs256

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-report
          path: apps/web/playwright-report/
          retention-days: 7

  security-audit:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - name: Audit dependencies
        run: pnpm audit --audit-level=high
