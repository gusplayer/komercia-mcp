name: Deploy

on:
  push:
    branches: [main]

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  deploy-mcp-server:
    name: Deploy MCP Server
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build MCP server
        run: pnpm build --filter @komercia-mcp/mcp-server

      - name: Deploy to Railway
        # TODO: replace with actual Railway deploy action/CLI call
        # Example: uses: railwayapp/railway-github-action@v1
        run: echo "Deploy step — configure Railway CLI here"
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}

  deploy-web:
    name: Deploy Web
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build web
        run: pnpm build --filter @komercia-mcp/web
        env:
          PUBLIC_MCP_SERVER_URL: ${{ vars.MCP_SERVER_URL }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}

      - name: Deploy to Railway
        # TODO: configure Railway deploy for Astro app
        run: echo "Deploy step — configure Railway CLI here"
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
