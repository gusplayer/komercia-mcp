name: Deploy

on:
  push:
    branches: [main]

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  deploy-mcp-server:
    name: Deploy MCP Server
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build MCP server
        run: pnpm build --filter @komercia-mcp/mcp-server

      - name: Deploy to Railway
        # TODO: replace with actual Railway deploy action/CLI call
        # Example: uses: railwayapp/railway-github-action@v1
        run: echo "Deploy step — configure Railway CLI here"
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
          # Secrets injected by Railway at runtime — listed here for documentation:
          # JWT_SECRET, DATABASE_URL, KOMERCIA_SESSION_ENCRYPTION_KEY
          # KOMERCIA_NODE_URL, KOMERCIA_NODE_PUBLIC_KEY
          # KOMERCIA_LARAVEL_URL, KOMERCIA_LARAVEL_CLIENT_ID, KOMERCIA_LARAVEL_CLIENT_SECRET
          # KOMERCIA_EDITOR_URL
          # MCP_TRANSPORT=http, MCP_ALLOWED_ORIGINS=https://claude.ai,https://mcp.komercia.co
          # NODE_ENV=production

  deploy-web:
    name: Deploy Web
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build web
        run: pnpm build --filter @komercia-mcp/web
        env:
          NODE_ENV: production
          # Build-time vars (Astro inlines PUBLIC_* at build time)
          PUBLIC_MCP_SERVER_URL: https://mcp.komercia.co/mcp
          # Runtime secrets injected by Railway — listed here for documentation:
          # DATABASE_URL, JWT_SECRET, KOMERCIA_SESSION_ENCRYPTION_KEY
          # KOMERCIA_NODE_URL, KOMERCIA_LARAVEL_URL
          # KOMERCIA_LARAVEL_CLIENT_ID, KOMERCIA_LARAVEL_CLIENT_SECRET
          # WEB_BASE_URL=https://mcp.komercia.co

      - name: Deploy to Railway
        # TODO: configure Railway deploy for Astro Node adapter
        run: echo "Deploy step — configure Railway CLI here"
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
