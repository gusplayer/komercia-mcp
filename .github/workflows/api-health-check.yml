name: API Health Check

on:
  schedule:
    # Every Sunday at 06:00 UTC
    - cron: "0 6 * * 0"
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry run (discover but do not commit report)"
        required: false
        default: "false"
        type: boolean

jobs:
  discover:
    name: Run API Discovery
    runs-on: ubuntu-latest
    # Skip gracefully if credentials are not configured
    if: >
      vars.KOMERCIA_DISCOVERY_ENABLED == 'true' ||
      github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build discovery CLI
        run: pnpm build --filter @komercia-mcp/discovery

      - name: Run discovery
        run: pnpm discover
        env:
          KOMERCIA_TEST_MERCHANT_EMAIL: ${{ secrets.KOMERCIA_TEST_MERCHANT_EMAIL }}
          KOMERCIA_TEST_MERCHANT_PASSWORD: ${{ secrets.KOMERCIA_TEST_MERCHANT_PASSWORD }}
          KOMERCIA_BACKEND_1_URL: ${{ secrets.KOMERCIA_BACKEND_1_URL }}
          KOMERCIA_BACKEND_2_URL: ${{ secrets.KOMERCIA_BACKEND_2_URL }}
          KOMERCIA_BACKEND_3_URL: ${{ secrets.KOMERCIA_BACKEND_3_URL }}

      - name: Commit updated report
        if: github.event.inputs.dry_run != 'true'
        uses: stefanzweifel/git-auto-commit-action@v7
        with:
          commit_message: "chore: update API discovery report [skip ci]"
          file_pattern: "docs/api-discovery-report.md packages/komercia-client/src/generated/api-map.json"
          commit_author: "github-actions[bot] <github-actions[bot]@users.noreply.github.com>"
