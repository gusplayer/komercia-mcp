# Disable empty issues so every new report goes through one of the
# two structured templates (bug_report.md / feature_request.md) and
# point sensitive paths at their canonical channel.
blank_issues_enabled: false
contact_links:
  - name: 🔒 Security vulnerability
    url: https://github.com/gusplayer/komercia-mcp/security/advisories/new
    about: Privately report a vulnerability via GitHub Security Advisories. See SECURITY.md for the full disclosure process.
  - name: 💬 Questions, usage help, ideas
    url: https://github.com/gusplayer/komercia-mcp/discussions
    about: For questions, integration help and open-ended discussion, please use Discussions instead of opening an issue.
  - name: 🌐 Live site
    url: https://mcp.komercia.co
    about: Production landing — get a token and connect your store.
